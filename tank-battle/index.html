<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>坦克大战 Tank Battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="512" height="416"></canvas>
    <div class="touch-controls" id="touchControls">
      <div class="joystick" id="joystick" aria-label="方向摇杆">
        <div class="stick" id="stick"></div>
      </div>
      <div class="actions">
        <button class="tbtn small" id="btnPause" aria-label="暂停">II</button>
        <button class="tbtn fire" id="btnFire" aria-label="射击">开火</button>
      </div>
    </div>
    <p class="hint">方向键 / WASD 移动 · 空格 / J 射击 · P 暂停 · Enter 开始</p>
  </div>
  <script src="js/audio.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
